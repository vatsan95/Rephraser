name: Windows Build (Phase 1 Tauri skeleton)

# Phase 1+ CI: build + lint + package MSI/NSIS on windows-latest.
# Later phases add signing, VirusTotal scan, release publishing.

on:
  push:
    branches: [main]
    tags: ['win-v*']
    paths:
      - 'windows/app/**'
      - '.github/workflows/windows-build.yml'
  pull_request:
    paths:
      - 'windows/app/**'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

permissions:
  # `contents: write` is needed for the release-on-tag step further down.
  # Read-only jobs (deny, PR builds) don't exercise it.
  contents: write

jobs:
  # cargo-deny runs on Linux because the official action ships as a Linux
  # container. Cheap supply-chain gate — licenses + advisories + source
  # registry allow-list. Fails the workflow before we burn a Windows build
  # on a doomed PR.
  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: windows/app/src-tauri/Cargo.toml
          command: check
          command-arguments: "--hide-inclusion-graph"

  # Secondary supply-chain gate: RustSec advisory DB via cargo-audit.
  # cargo-deny covers licenses + yanked crates; audit specifically hits
  # CVEs with finer-grained filtering. Both run because overlap is small
  # and both are cheap.
  audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: windows/app/src-tauri

  build:
    name: Build Rephraser on windows-latest
    runs-on: windows-latest
    needs: [deny, audit]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo (tauri app)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows/app/src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        shell: pwsh
        working-directory: windows/app
        run: pnpm install --frozen-lockfile

      - name: Rust fmt + clippy
        shell: pwsh
        working-directory: windows/app/src-tauri
        run: |
          cargo fmt --check
          cargo clippy --release -- -D warnings

      - name: Build Tauri app (MSI + NSIS)
        shell: pwsh
        working-directory: windows/app
        env:
          # Updater signing disabled for Phase 1 skeleton; real key lands in Phase 6.
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build

      - name: Report bundle sizes
        shell: pwsh
        working-directory: windows/app
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsis = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            $msiMB = [math]::Round($msi.Length / 1MB, 2)
            Write-Host "MSI: $($msi.Name) = $msiMB MB"
            if ($msiMB -gt 25) { throw "GATE FAILED: MSI $msiMB MB exceeds 25 MB budget" }
          } else { Write-Host "No MSI produced" }
          if ($nsis) {
            $nsisMB = [math]::Round($nsis.Length / 1MB, 2)
            Write-Host "NSIS: $($nsis.Name) = $nsisMB MB"
            if ($nsisMB -gt 25) { throw "GATE FAILED: NSIS $nsisMB MB exceeds 25 MB budget" }
          } else { Write-Host "No NSIS installer produced" }

      - name: Upload MSI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rephraser-windows-msi
          path: windows/app/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 14
          if-no-files-found: warn

      - name: Upload NSIS installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rephraser-windows-nsis
          path: windows/app/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14
          if-no-files-found: warn

      # VirusTotal scan — non-blocking; only runs when VT_API_KEY is set.
      # Fails soft so forks / PRs without the secret keep building. The
      # `analysis` output is captured so downstream steps (release body +
      # job summary) can link directly to each scan page.
      - name: VirusTotal scan (MSI + NSIS)
        id: vt
        if: ${{ success() && env.VT_API_KEY != '' }}
        continue-on-error: true
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            windows/app/src-tauri/target/release/bundle/nsis/*.exe
            windows/app/src-tauri/target/release/bundle/msi/*.msi

      # Surface VT URLs in the Actions job summary so maintainers can
      # eyeball any red flags, and stash them as a step output for the
      # release step to embed in the release notes.
      - name: Report VirusTotal URLs
        if: ${{ steps.vt.outputs.analysis != '' }}
        id: vt_report
        shell: pwsh
        run: |
          $raw = "${{ steps.vt.outputs.analysis }}"
          "## VirusTotal scans" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $lines = @()
          foreach ($entry in $raw.Split(',')) {
            $parts = $entry.Split('=', 2)
            if ($parts.Length -eq 2) {
              $name = Split-Path -Leaf $parts[0]
              $url = $parts[1]
              "- [$name]($url)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              $lines += "- [$name]($url)"
            }
          }
          $md = ($lines -join "`n")
          "markdown<<EOF`n$md`nEOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # ------- Release-on-tag (win-v*) -------
      # Publishes MSI + NSIS as release assets and writes the VT scan URLs
      # (captured above) into the release body. Matches the stable asset
      # names that the website's /releases/latest/download/ links expect.
      - name: Stage release assets with stable names
        if: ${{ startsWith(github.ref, 'refs/tags/win-v') }}
        shell: pwsh
        working-directory: windows/app
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          $nsis = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName "release-assets/Rephraser-setup.msi" }
          if ($nsis) { Copy-Item $nsis.FullName "release-assets/Rephraser-setup.exe" }

      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/win-v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/app/release-assets/Rephraser-setup.exe
            windows/app/release-assets/Rephraser-setup.msi
          name: Rephraser for Windows ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            Rephraser for Windows — ${{ github.ref_name }}

            **Downloads**
            - `Rephraser-setup.exe` — NSIS installer, recommended
            - `Rephraser-setup.msi` — MSI installer, for enterprise `/quiet` deployment

            **Security & transparency**
            Every Windows build is scanned by VirusTotal in CI. Scan pages for
            the files in this release:

            ${{ steps.vt_report.outputs.markdown || '_VT scan was skipped for this build (VT_API_KEY not set)._' }}

            If fewer than 3 engines flag the file it's almost certainly a
            heuristic false positive — Rust binaries that call `SendInput`
            and read the clipboard are a known AV trigger. See the
            [install guide](https://vatsan95.github.io/Rephraser/windows.html)
            for the SmartScreen walkthrough.
