# cargo-deny config — licence + advisory gates for the Windows app.
# Run in CI via the `Windows Build` workflow.

[graph]
targets = [
    { triple = "x86_64-pc-windows-msvc" },
]

[licenses]
# Explicit allowlist; anything not on this list fails CI.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = [
    # Tauri uses a dual Apache-2.0/MIT license — detected via SPDX above.
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "allow"   # Tauri + llama.cpp each pull old windows-sys; fine.
wildcards = "deny"
highlight = "all"

[advisories]
version = 2
yanked = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
