name: Rephraser

options:
  bundleIdPrefix: com.rephraser
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.21.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Rephraser:
    type: application
    platform: macOS
    sources:
      - path: Rephraser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rephraser.app
        INFOPLIST_FILE: Rephraser/Info.plist
        CODE_SIGN_ENTITLEMENTS: Rephraser/Rephraser.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: Rephraser
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: HotKey
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: Sparkle
        product: Sparkle
